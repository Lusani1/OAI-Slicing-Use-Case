version: '3.8'
services:
    vpp-upf2:
        privileged: true
        container_name: "vpp-upf2"
        image: oaisoftwarealliance/oai-upf-vpp:v2.1.0
        environment:
            - IF_1_IP=192.168.70.202
            - IF_1_TYPE=N4
            - IF_2_IP=192.168.74.202
            - IF_2_TYPE=N3
            - IF_2_NWI=access.oai.org
            - IF_3_IP=192.168.73.202
            - IF_3_TYPE=N6
            - IF_3_IP_REMOTE=192.168.73.139 # EXT-DN IP Address
            - IF_3_NWI=internet.oai.org
            - NAME=VPP-UPF2
            - MNC=95
            - MCC=208
            - REALM=3gppnetwork.org
            - VPP_MAIN_CORE=0
            - VPP_CORE_WORKER=1
#           - VPP_PLUGIN_PATH=/usr/lib64/vpp_plugins/                # RHEL7
            - VPP_PLUGIN_PATH=/usr/lib/x86_64-linux-gnu/vpp_plugins/ # Ubntu18.04
            - SNSSAI_SD=000001
            - SNSSAI_SST=1
            - DNN=oai.ipv4
            - REGISTER_NRF=yes
            - NRF_IP_ADDR=192.168.70.130
            #changes for HTTP2
            - NRF_PORT=8080
            - HTTP_VERSION=2
        depends_on:
            - oai-nrf
        healthcheck:
            test: /bin/bash -c "pgrep vpp"
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            public_net:
                ipv4_address: 192.168.70.135
            public_net_access2:
                ipv4_address: 192.168.74.135
            public_net_core:
                ipv4_address: 192.168.73.136

networks:
    public_net:
        driver: bridge
        name: demo-oai-public-net
        ipam:
            config:
                - subnet: 192.168.70.0/24
        driver_opts:
            com.docker.network.bridge.name: "demo-oai"
    public_net_access:
        name: oai-public-access
        ipam:
            config:
                - subnet: 192.168.72.0/24
        driver_opts:
            com.docker.network.bridge.name: "cn5g-access"
    public_net_core:
        name: oai-public-core
        ipam:
            config:
                - subnet: 192.168.73.0/24
        driver_opts:
            com.docker.network.bridge.name: "cn5g-core"
    public_net_access2:
        name: oai-public-access2
        ipam:
            config:
                - subnet: 192.168.74.0/24
        driver_opts:
            com.docker.network.bridge.name: "cn5g-access2"

    public_net_access3:
        name: oai-public-access3
        ipam:
            config:
                - subnet: 192.168.75.0/24
        driver_opts:
            com.docker.network.bridge.name: "cn5g-access3"
