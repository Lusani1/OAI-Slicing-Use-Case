version: '3.8'
services:
    ueransim2:
        container_name: ueransim2
        image: ueransim:latest
        privileged: true
        environment:
            # GNB Congig Parameters
            - MCC=208
            - MNC=95
            - NCI=0x000000013
            - TAC=0xa000
            - LINK_IP=192.168.70.144
            - NGAP_IP=192.168.70.144
            - GTP_IP=192.168.75.144
            - NGAP_PEER_IP=192.168.70.132
            - SST=1
            - SD=0
            - IGNORE_STREAM_IDS=true
            # UE Config Parameters
            - NUMBER_OF_UE=1
            - IMSI=208950000000060
            - KEY=0C0A34601D4F07677303652C0462535B
            - OP=63bfa50ee6523365ff14c1f45f88737d
            - OP_TYPE=OPC
            - AMF_VALUE=8000
            - IMEI=356938035643803
            - IMEI_SV=0035609204079514
            - GNB_IP_ADDRESS=192.168.70.144
            - PDU_TYPE=IPv4
            - APN=oai
            - SST_0=1
            - SD_0=0
            - SST_C=1
            - SD_C=0
            - SST_D=1
            - SD_D=0
        networks:
            public_net:
                ipv4_address: 192.168.70.144
            public_net_access3:
                ipv4_address: 192.168.75.144
        healthcheck:
            test: /bin/bash -c "ifconfig uesimtun0"
            interval: 10s
            timeout: 5s
            retries: 5
networks:
    public_net:
        external:
            name: demo-oai-public-net
    public_net_access3:
        external:
            name: oai-public-access3


